<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atrof muhitni muhofaza qilish va yashil rivojlanish</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f9f6;
font-family: 'Segoe UI', sans-serif;
}

/* Navbar */

.navbar{
background:linear-gradient(90deg,#1b5e20,#2e7d32);
padding:14px;
}

.navbar-brand{
font-weight:600;
font-size:20px;
}

.nav-link{
color:white !important;
margin-left:15px;
font-weight:500;
}

.nav-link:hover{
opacity:0.8;
}

/* Hero section */

.hero{
background:linear-gradient(135deg,#2e7d32,#66bb6a);
color:white;
padding:60px;
border-radius:12px;
margin-top:25px;
text-align:center;
}

.hero h1{
font-size:40px;
font-weight:700;
}

.hero p{
font-size:18px;
opacity:0.9;
}

/* Cards */

.card{
border:none;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card-title{
font-weight:600;
}

.btn-green{
background:#2e7d32;
color:white;
border:none;
}

.btn-green:hover{
background:#1b5e20;
}

/* Footer */

.footer{
margin-top:60px;
padding:25px;
background:#1b5e20;
color:white;
text-align:center;
border-radius:10px 10px 0 0;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand" href="/">
🌿 Ekologiya kursi
</a>

<div>

<a class="nav-link d-inline" href="/">Home</a>
<a class="nav-link d-inline" href="/maruza">Maruza</a>
<a class="nav-link d-inline" href="/amaliyot">Amaliyot</a>
<a class="nav-link d-inline" href="/resurslar">Resurslar</a>

</div>

</div>

</nav>

<div class="container">

{% block content %}

{% endblock %}

</div>

<div class="footer">

<p>Atrof muhitni muhofaza qilish va yashil rivojlanish</p>
<p>Instructor: Fozilov Azamat</p>

</div>

</body>

</html>
